<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archive Chat</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/highlight.min.js"></script>
  </head>
  <body>
    <aside class="sidebar">
      <header class="brand">
        <div class="logo">A</div>
        <div>
          <div class="brand-title">Archive Chat</div>
          <div class="brand-sub">persisted to API</div>
        </div>
      </header>
      <button id="new-chat" class="new-chat-btn">+ New chat</button>
      <div class="health" id="health">checking…</div>
      <ul id="chat-list" class="chat-list"></ul>
      <footer class="sidebar-foot">
        <a href="/api/docs" target="_blank">Chat API</a>
        <span>·</span>
        <a href="http://localhost:8000/docs" target="_blank">Archive API</a>
      </footer>
    </aside>

    <main class="conversation">
      <header class="conv-head">
        <div>
          <div class="conv-title" id="conv-title">New chat</div>
          <div class="conv-sub" id="conv-sub">pick a chat or start typing</div>
        </div>
        <div class="conv-meta" id="conv-meta"></div>
      </header>

      <section id="messages" class="messages">
        <div class="empty">
          <h2>Say hi 👋</h2>
          <p>
            Every message and reply is persisted to the
            <code>messages</code> table by the archive service.
          </p>
        </div>
      </section>

      <form id="composer" class="composer">
        <textarea
          id="input"
          placeholder="Ask anything…  (⌘/Ctrl+Enter to send)"
          rows="2"
          autocomplete="off"
        ></textarea>
        <button type="submit" id="send" class="send-btn">Send</button>
      </form>
    </main>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
