name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.14"

jobs:
  # ============================================================================
  # Lint, type-check, security scan
  # ============================================================================
  quality:
    name: Lint / Types / Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff (lint)
        run: uv run ruff check app tests

      - name: Ruff (format check)
        run: uv run ruff format --check app tests

      - name: Mypy
        run: uv run mypy app

      - name: Bandit
        run: uv run bandit -c pyproject.toml -r app

      - name: pip-audit
        run: uv run pip-audit --strict --ignore-vuln GHSA-4xh5-x5gv-qwph || true

  # ============================================================================
  # Tests against a real Postgres
  # ============================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: archive
          POSTGRES_PASSWORD: archive
          POSTGRES_DB: archive
        options: >-
          --health-cmd "pg_isready -U archive -d archive"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+asyncpg://archive:archive@localhost:5432/archive
      API_KEYS: test-key
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  # ============================================================================
  # Build image, scan with Trivy
  # ============================================================================
  image:
    name: Build & Scan Image
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: message-archive:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: message-archive:ci
          format: table
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
