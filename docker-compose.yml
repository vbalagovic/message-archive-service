services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archive}
      POSTGRES_DB: ${POSTGRES_DB:-archive}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archive} -d ${POSTGRES_DB:-archive}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "${DB_PORT:-5432}:5432"
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-archive}:${POSTGRES_PASSWORD:-archive}@db:5432/${POSTGRES_DB:-archive}
      API_KEYS: ${API_KEYS:-dev-key-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-32768}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      ENVIRONMENT: ${ENVIRONMENT:-local}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  # ==========================================================================
  # LLM stack — opt-in via `--profile llm` (or `make llm-up`).
  # Default `make up` does NOT start any of these.
  # ==========================================================================
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["llm"]
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: "5m"
    volumes:
      - ollama-models:/root/.ollama
    # No host port by default (the chat BFF reaches it on the container network).
    # Uncomment to expose for debugging — change OLLAMA_PORT in .env if 11434 is taken locally.
    # ports:
    #   - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # One-shot: pulls the configured model on first boot, then exits.
  ollama-pull:
    image: ollama/ollama:latest
    profiles: ["llm"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
      LLM_MODEL: ${LLM_MODEL:-gemma3:1b}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "echo '[ollama-pull] pulling $$LLM_MODEL (this can take a few minutes on first run)';
       ollama pull $$LLM_MODEL && echo '[ollama-pull] done.'"
    restart: "no"

  chat:
    build:
      context: .
      dockerfile: chat/Dockerfile
    profiles: ["llm"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      ARCHIVE_URL: http://api:8000
      ARCHIVE_API_KEY: ${API_KEYS:-dev-key-change-me}
      OLLAMA_URL: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-gemma3:1b}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${CHAT_PORT:-8001}:8001"
    # Live-mount UI so frontend edits don't require rebuilding the image.
    # The chat Python code is still baked in the image (rebuild on changes).
    volumes:
      - ./ui:/app/ui:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
  ollama-models:
